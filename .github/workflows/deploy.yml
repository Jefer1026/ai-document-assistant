name: Deploy a OCI

on:
  push:
    branches: [ main ]

jobs:
  deploy-a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Copiar todos los archivos a Servidor A
      - name: Copy files to Server A
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST_A }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "./"
          target: "/home/ubuntu/n8n-project/"

      # 2. Ejecutar Docker Compose en A
      - name: Deploy n8n Servidor A
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST_A }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navegar a la carpeta
            cd /home/ubuntu/n8n-project/

            # 2. Detener y eliminar el contenedor viejo y la red asociada
            docker compose -f /home/ubuntu/n8n-project/infra/docker-compose.server-n8n.yml down

            # 3. Descargar la versión más reciente de la imagen
            docker compose -f /home/ubuntu/n8n-project/infra/docker-compose.server-n8n.yml pull

            # 4. Levantar el servicio
            docker compose -f /home/ubuntu/n8n-project/infra/docker-compose.server-n8n.yml up -d

  deploy-b:
    runs-on: ubuntu-latest
    needs: deploy-a
    steps:
      - uses: actions/checkout@v4

      # 3. Copiar archivos al Servidor B (a través de A)
      # Nota: Usamos el mismo mecanismo de proxy para copiar archivos
      - name: Copy files to Server B
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST_B }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          proxy_host: ${{ secrets.SSH_HOST_A }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          source: "./"
          target: "/home/ubuntu/ai-agent/"

      # 4. Ejecutar Docker Compose en B
      - name: Deploy Ollama Servidor B
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST_B }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          proxy_host: ${{ secrets.SSH_HOST_A }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navegar a la carpeta del proyecto
            cd /home/ubuntu/n8n-project/

            # 2. Asegurar que la carpeta de datos existe
            mkdir -p /home/ubuntu/n8n-project/ollama_data

            # 3. Detener, actualizar y levantar Ollama
            docker compose -f /home/ubuntu/n8n-project/infra/docker-compose.server-ollama.yml down
            docker compose -f /home/ubuntu/n8n-project/infra/docker-compose.server-ollama.yml pull
            docker compose -f /home/ubuntu/n8n-project/infra/docker-compose.server-ollama.yml up -d


            
